# Single-object file: the object IS the document, keyed by a top-level
# `fullName:` (not the filename). Demonstrates common field types — Currency,
# Picklist, and Lookup. Renaming this file never changes the deployed API name.
fullName: Invoice__c
label: Invoice
pluralLabel: Invoices
description: Customer invoices
sharingModel: ReadWrite
deploymentStatus: Deployed
nameField:
  fullName: Name
  label: Invoice Number
  type: AutoNumber
  displayFormat: INV-{0000}

fields:
  Amount__c:
    label: Amount
    type: Currency
    precision: 16
    scale: 2
    required: true

  Status__c:
    label: Status
    type: Picklist
    valueSet:
      values:
        - fullName: Draft
          label: Draft
          default: true
        - fullName: Sent
          label: Sent
        - fullName: Paid
          label: Paid

  Account__c:
    label: Account
    type: Lookup
    referenceTo: Account
    relationshipLabel: Invoices
    relationshipName: Invoices
    deleteConstraint: SetNull
