# Master-detail example (single-file form): one master object (Order) and one
# detail object (Order Item) linked by a MasterDetail field on the detail.
# See nested-details.yaml for the same relationship expressed via `details:`.
objects:
  # ---- Master ----
  Order__c:
    label: Order
    pluralLabel: Orders
    description: A customer order that owns one or more line items
    sharingModel: ReadWrite
    nameField:
      fullName: Name
      label: Order Number
      type: AutoNumber
      displayFormat: ORD-{0000}

    fields:
      Stage__c:
        label: Stage
        type: Picklist
        valueSet:
          values:
            - fullName: Draft
              label: Draft
              default: true
            - fullName: Submitted
              label: Submitted
            - fullName: Fulfilled
              label: Fulfilled

  # ---- Detail ----
  Order_Item__c:
    label: Order Item
    pluralLabel: Order Items
    description: A line item that rolls up to its parent order
    # Detail objects inherit sharing from the master, so sharingModel is
    # controlled by the relationship rather than set here.
    nameField:
      fullName: Name
      label: Line Number
      type: AutoNumber
      displayFormat: LINE-{0000}

    fields:
      # The master-detail field: links each item to its parent order.
      Order__c:
        label: Order
        type: MasterDetail
        referenceTo: Order__c
        relationshipLabel: Order Items
        relationshipName: Items
        reparentableMasterDetail: false

      Quantity__c:
        label: Quantity
        type: Number
        precision: 5
        scale: 0
